{% extends 'base.html' %}

{% block title %}Add Event | Run Club Hub{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
    <h1 class="mb-4">Add Event</h1>

    <div class="card p-4">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-dark">Create Event</button>
            <a href="{% url 'events' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
